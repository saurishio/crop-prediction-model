<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <h1>Crop Prediction Model</h1>

        <form action="{{ url_for('predict') }}" method="post">

            <input type="number" name="Nitrogen" placeholder="Nitrogen (kg/ha)" step="any" required>
            <input type="number" name="Phosphorus" placeholder="Phosphorus (kg/ha)" step="any" required>
            <input type="number" name="Potassium" placeholder="Potassium (kg/ha)" step="any" required>
            <input type="number" name="temperature" placeholder="Temperature (°C)" step="any" required>
            <input type="number" name="humidity" placeholder="Humidity (%)" step="any" required>
            <input type="number" name="pH" placeholder="Soil pH" step="0.1" required>
            <input type="number" name="rainfall" placeholder="Rainfall (mm)" step="any" required>

            <button type="submit">Predict Crop</button>

        </form>

        {% if prediction_text %}
            <div class="result">
                <h2>{{ prediction_text }}</h2>
            </div>
        {% endif %}
    </div>
</body>
</html>
